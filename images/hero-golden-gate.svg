<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d9a8"/>
      <stop offset="45%" stop-color="#e6b27a"/>
      <stop offset="75%" stop-color="#c98a6b"/>
      <stop offset="100%" stop-color="#8a6a72"/>
    </linearGradient>
    <linearGradient id="waterHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b6e7a"/>
      <stop offset="100%" stop-color="#33424c"/>
    </linearGradient>
    <linearGradient id="hillHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a6a63"/>
      <stop offset="100%" stop-color="#4f4541"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#skyHero)"/>

  <!-- distant hills -->
  <path d="M0,560 C300,500 600,620 960,540 C1300,470 1600,580 1920,520 L1920,760 L0,760 Z" fill="url(#hillHero)" opacity="0.55"/>
  <!-- Marin headlands -->
  <path d="M0,620 C260,520 520,640 820,560 L820,760 L0,760 Z" fill="#5f5048" opacity="0.8"/>
  <!-- city hills on right -->
  <path d="M1500,660 C1620,560 1760,600 1920,540 L1920,760 L1500,760 Z" fill="#5f5048" opacity="0.8"/>

  <!-- water -->
  <rect x="0" y="680" width="1920" height="400" fill="url(#waterHero)"/>
  <!-- water highlight streaks -->
  <g opacity="0.18" stroke="#f4d9a8" stroke-width="2">
    <line x1="100" y1="760" x2="500" y2="760"/>
    <line x1="650" y1="800" x2="1100" y2="800"/>
    <line x1="1300" y1="840" x2="1750" y2="840"/>
    <line x1="200" y1="900" x2="700" y2="900"/>
    <line x1="900" y1="950" x2="1600" y2="950"/>
  </g>

  <!-- Golden Gate Bridge -->
  <g stroke="#b8453a" stroke-width="10" fill="none" stroke-linecap="round">
    <!-- towers -->
    <line x1="760" y1="380" x2="760" y2="760"/>
    <line x1="1160" y1="380" x2="1160" y2="760"/>
    <!-- tower cross beams -->
    <line x1="730" y1="430" x2="790" y2="430"/>
    <line x1="730" y1="500" x2="790" y2="500"/>
    <line x1="1130" y1="430" x2="1190" y2="430"/>
    <line x1="1130" y1="500" x2="1190" y2="500"/>
    <!-- main cables -->
    <path d="M520,700 C620,420 900,420 960,420 C1020,420 1300,420 1400,700" stroke-width="6"/>
    <!-- deck -->
    <line x1="500" y1="700" x2="1420" y2="700" stroke-width="8"/>
  </g>
  <!-- vertical suspension cables -->
  <g stroke="#b8453a" stroke-width="3" opacity="0.85">
    <line x1="600" y1="700" x2="600" y2="540"/>
    <line x1="660" y1="700" x2="660" y2="480"/>
    <line x1="720" y1="700" x2="720" y2="440"/>
    <line x1="820" y1="700" x2="820" y2="430"/>
    <line x1="880" y1="700" x2="880" y2="425"/>
    <line x1="940" y1="700" x2="940" y2="420"/>
    <line x1="1000" y1="700" x2="1000" y2="423"/>
    <line x1="1060" y1="700" x2="1060" y2="432"/>
    <line x1="1120" y1="700" x2="1120" y2="450"/>
    <line x1="1200" y1="700" x2="1200" y2="500"/>
    <line x1="1260" y1="700" x2="1260" y2="560"/>
    <line x1="1320" y1="700" x2="1320" y2="630"/>
  </g>

  <!-- fog band -->
  <rect x="0" y="640" width="1920" height="80" fill="#f4ede4" opacity="0.18"/>

  <!-- foreground hill silhouette -->
  <path d="M0,1080 L0,820 C220,760 420,880 700,800 C980,720 1220,840 1500,780 C1680,740 1820,800 1920,760 L1920,1080 Z" fill="#26282b" opacity="0.9"/>
</svg>
