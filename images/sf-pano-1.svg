<!-- Cow Hollow / Marina-style panorama: Victorian rowhouses with bay + bridge beyond -->
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe6ee"/>
      <stop offset="60%" stop-color="#eef2ee"/>
      <stop offset="100%" stop-color="#f3ede4"/>
    </linearGradient>
    <linearGradient id="water1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9fb8c4"/>
      <stop offset="100%" stop-color="#7a96a5"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky1)"/>

  <!-- distant hills -->
  <path d="M0,560 C400,500 800,600 1200,520 C1500,470 1750,540 1920,500 L1920,640 L0,640 Z" fill="#b9c8c2" opacity="0.7"/>

  <!-- faint Golden Gate Bridge in background -->
  <g stroke="#c9776a" stroke-width="5" fill="none" opacity="0.55">
    <line x1="1540" y1="430" x2="1540" y2="600"/>
    <line x1="1740" y1="430" x2="1740" y2="600"/>
    <path d="M1440,580 C1480,420 1640,420 1640,420 C1640,420 1800,420 1840,580"/>
  </g>

  <!-- bay water -->
  <rect x="0" y="600" width="1920" height="160" fill="url(#water1)"/>
  <g opacity="0.25" stroke="#ffffff" stroke-width="2">
    <line x1="80" y1="650" x2="420" y2="650"/>
    <line x1="520" y1="690" x2="900" y2="690"/>
    <line x1="1000" y1="640" x2="1380" y2="640"/>
    <line x1="1480" y1="700" x2="1850" y2="700"/>
  </g>

  <!-- foreground street level -->
  <rect x="0" y="760" width="1920" height="320" fill="#e7e2da"/>

  <!-- row of Victorian / Edwardian houses -->
  <g>
    <!-- house template repeated with varied colors -->
    <!-- House 1 -->
    <g transform="translate(40,560)">
      <rect x="0" y="100" width="220" height="200" fill="#caa9a0"/>
      <polygon points="0,100 110,40 220,100" fill="#b8923f"/>
      <rect x="30" y="150" width="40" height="60" fill="#fdfaf5" opacity="0.85"/>
      <rect x="150" y="150" width="40" height="60" fill="#fdfaf5" opacity="0.85"/>
      <rect x="90" y="200" width="40" height="100" fill="#3b3e42" opacity="0.7"/>
    </g>
    <!-- House 2 -->
    <g transform="translate(260,520)">
      <rect x="0" y="140" width="240" height="240" fill="#9fb6b0"/>
      <polygon points="0,140 120,60 240,140" fill="#8a7660"/>
      <rect x="30" y="190" width="50" height="70" fill="#fdfaf5" opacity="0.85"/>
      <rect x="160" y="190" width="50" height="70" fill="#fdfaf5" opacity="0.85"/>
      <rect x="100" y="280" width="50" height="100" fill="#3b3e42" opacity="0.7"/>
    </g>
    <!-- House 3 -->
    <g transform="translate(500,480)">
      <rect x="0" y="180" width="260" height="280" fill="#e3cf9e"/>
      <polygon points="0,180 130,90 260,180" fill="#b8923f"/>
      <rect x="40" y="230" width="55" height="80" fill="#fdfaf5" opacity="0.85"/>
      <rect x="165" y="230" width="55" height="80" fill="#fdfaf5" opacity="0.85"/>
      <rect x="110" y="340" width="55" height="120" fill="#3b3e42" opacity="0.7"/>
    </g>
    <!-- House 4 -->
    <g transform="translate(760,540)">
      <rect x="0" y="140" width="230" height="240" fill="#cdd6c8"/>
      <polygon points="0,140 115,60 230,140" fill="#8a7660"/>
      <rect x="30" y="190" width="48" height="70" fill="#fdfaf5" opacity="0.85"/>
      <rect x="150" y="190" width="48" height="70" fill="#fdfaf5" opacity="0.85"/>
      <rect x="95" y="280" width="48" height="100" fill="#3b3e42" opacity="0.7"/>
    </g>
    <!-- House 5 -->
    <g transform="translate(990,500)">
      <rect x="0" y="160" width="250" height="260" fill="#c9b6c8"/>
      <polygon points="0,160 125,75 250,160" fill="#b8923f"/>
      <rect x="35" y="210" width="52" height="80" fill="#fdfaf5" opacity="0.85"/>
      <rect x="160" y="210" width="52" height="80" fill="#fdfaf5" opacity="0.85"/>
      <rect x="100" y="320" width="52" height="100" fill="#3b3e42" opacity="0.7"/>
    </g>
    <!-- House 6 -->
    <g transform="translate(1240,540)">
      <rect x="0" y="140" width="230" height="240" fill="#f0ddb8"/>
      <polygon points="0,140 115,60 230,140" fill="#8a7660"/>
      <rect x="30" y="190" width="48" height="70" fill="#fdfaf5" opacity="0.85"/>
      <rect x="150" y="190" width="48" height="70" fill="#fdfaf5" opacity="0.85"/>
      <rect x="95" y="280" width="48" height="100" fill="#3b3e42" opacity="0.7"/>
    </g>
    <!-- House 7 -->
    <g transform="translate(1470,500)">
      <rect x="0" y="160" width="260" height="260" fill="#cfa9a0"/>
      <polygon points="0,160 130,75 260,160" fill="#b8923f"/>
      <rect x="35" y="210" width="52" height="80" fill="#fdfaf5" opacity="0.85"/>
      <rect x="170" y="210" width="52" height="80" fill="#fdfaf5" opacity="0.85"/>
      <rect x="105" y="320" width="52" height="100" fill="#3b3e42" opacity="0.7"/>
    </g>
    <!-- House 8 -->
    <g transform="translate(1730,540)">
      <rect x="0" y="140" width="230" height="240" fill="#b9c8c2"/>
      <polygon points="0,140 115,60 230,140" fill="#8a7660"/>
      <rect x="30" y="190" width="48" height="70" fill="#fdfaf5" opacity="0.85"/>
      <rect x="150" y="190" width="48" height="70" fill="#fdfaf5" opacity="0.85"/>
      <rect x="95" y="280" width="48" height="100" fill="#3b3e42" opacity="0.7"/>
    </g>
  </g>

  <!-- foreground street and sidewalk lines -->
  <rect x="0" y="1000" width="1920" height="80" fill="#26282b" opacity="0.85"/>
  <g stroke="#f3ede4" stroke-width="6" opacity="0.5" stroke-dasharray="40 30">
    <line x1="0" y1="1040" x2="1920" y2="1040"/>
  </g>
</svg>
